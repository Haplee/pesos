<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GymLog</title>
<link rel="icon" type="image/png" href="/gimnasia.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c8ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.15);
    --accent-glow: rgba(200,255,0,0.4);
    --text: #f4f4f6;
    --text2: #a0a0a8;
    --muted: #606068;
    --danger: #ff5252;
    --radius: 16px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: manipulation; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; line-height: 1.4; min-height: 100vh; }

  #auth-screen { min-height: 100vh; height: 100%; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .auth-box { width: 100%; max-width: 320px; text-align: center; }
  .logo-text { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; }
  .logo-text span { color: var(--accent); }
  .auth-sub { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }
  .field-label { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 0.5rem; display: block; text-align: left; }
  input, select {
    width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); font-size: 1.1rem; padding: 1rem; outline: none; margin-bottom: 1rem; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); font-size: 1rem; }
  .btn { width: 100%; padding: 1.1rem; background: var(--accent); color: #0a0a0c; border: none; border-radius: var(--radius-sm); font-size: 1.1rem; font-weight: 700; cursor: pointer; }
  .btn-sm { width: auto; padding: 0.6rem 1rem; font-size: 0.9rem; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); }
  .btn-icon { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; }

  .quick-users { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .quick-users-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem; display: block; }
  .user-chip { display: inline-flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 25px; padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; margin: 0.3rem; }
  .user-chip:active { border-color: var(--accent); background: var(--accent-dim); }

  #app-screen { display: none; min-height: 100vh; flex-direction: column; height: 100%; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: rgba(10,10,12,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-img { width: 32px; height: 32px; border-radius: 8px; object-fit: contain; background: var(--surface); border: 1px solid var(--accent); }
  .topbar-logo { font-size: 1.1rem; font-weight: 800; }
  .topbar-logo span { color: var(--accent); }
  .user-badge { font-size: 0.85rem; color: var(--text2); }
  .logout-btn { font-size: 0.8rem; padding: 0.5rem 0.8rem; }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 1rem 0.5rem; font-size: 1rem; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; text-align: center; font-weight: 600; }
  .tab:active { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { flex: 1; padding: 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }
  .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; margin-bottom: 0.75rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem; text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 600; }

  .chart-bars { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 4px; position: relative; padding-bottom: 20px; }
  .chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .bar-fill { width: 100%; background: linear-gradient(to top, var(--accent), rgba(200,255,0,0.5)); border-radius: 4px 4px 0 0; min-height: 4px; }
  .bar-label { position: absolute; bottom: -18px; font-size: 0.7rem; color: var(--muted); font-weight: 600; }

  .sets-header { display: grid; grid-template-columns: 36px 1fr 80px 40px; gap: 0.5rem; margin-bottom: 0.5rem; padding-left: 36px; }
  .sets-header div { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .set-row { display: grid; grid-template-columns: 36px 1fr 80px 40px; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
  .set-num { font-size: 1rem; color: var(--text2); text-align: center; font-weight: 600; }
  .set-row input { font-size: 1.1rem; padding: 0.75rem; margin: 0; }

  .form-actions { display: flex; gap: 0.6rem; margin-top: 1rem; }
  .btn-add { background: transparent; border: 1px dashed var(--border2); color: var(--text2); border-radius: 10px; padding: 0.75rem 1rem; font-size: 1rem; font-weight: 600; cursor: pointer; }

  .rest-timer { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; padding: 0.75rem; background: var(--surface2); border-radius: 12px; }
  .rest-timer-btn { font-size: 0.9rem; padding: 0.5rem 0.75rem; }
  .rest-timer-display { font-size: 1.3rem; color: var(--accent); min-width: 50px; text-align: center; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  th { background: var(--surface); padding: 0.75rem; text-align: left; color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
  .td-exercise { font-weight: 600; }
  .td-num { color: var(--accent); font-weight: 700; }
  .td-muted { color: var(--muted); font-size: 0.85rem; }
  .pr-badge { background: var(--accent-dim); color: var(--accent); border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; font-weight: 700; margin-left: 4px; }
  .empty-state { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 1rem; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 2px solid var(--accent); color: var(--text); font-size: 1rem; font-weight: 600; padding: 0.75rem 1.25rem; border-radius: 12px; opacity: 0; transition: opacity 0.2s; z-index: 999; }
  .toast.show { opacity: 1; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 1.5rem; max-width: 320px; width: 90%; }
  .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
  .modal-sub { font-size: 1rem; color: var(--text2); margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 0.95rem; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; }

  .history-filters { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .history-filters select { width: auto; font-size: 0.95rem; padding: 0.5rem 0.75rem; margin: 0; }
</style>
</head>

<div id="auth-screen">
  <div class="auth-box">
    <div class="logo-text">Gym<span>Log</span></div>
    <div class="auth-sub">tu entreno</div>
    <div class="field-label">tu nombre</div>
    <input type="text" id="username-input" placeholder="tu nombre" maxlength="25">
    <button class="btn" onclick="login()">Entrar</button>
    <div class="quick-users" id="quick-users" style="display:none">
      <span class="quick-users-label">Acceso rápido</span>
      <div id="user-chips"></div>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <img src="/gimnasia.png" class="topbar-img" alt="logo">
      <div>
        <div class="topbar-logo">Gym<span>Log</span></div>
        <div class="user-badge" id="topbar-user"></div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm logout-btn" onclick="logout()">Salir</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="train">🏋️ Entrenar</div>
    <div class="tab" data-tab="stats">📊 Stats</div>
    <div class="tab" data-tab="history">📋 Historial</div>
  </div>

  <div class="main">
    <div class="tab-content active" id="tab-train">
      <div class="card">
        <select id="exercise-select" onchange="onExerciseChange(this)">
          <option value="">— ejercicio —</option>
          <optgroup label="Pecho">
            <option>Press banca</option>
            <option>Press inclinado</option>
            <option>Fondos</option>
          </optgroup>
          <optgroup label="Espalda">
            <option>Dominadas</option>
            <option>Remo</option>
            <option>Jalón</option>
          </optgroup>
          <optgroup label="Pierna">
            <option>Sentadilla</option>
            <option>Peso muerto</option>
            <option>Prensa</option>
          </optgroup>
          <optgroup label="Otros">
            <option>Press militar</option>
            <option>Curl bíceps</option>
            <option>Tríceps</option>
          </optgroup>
          <option value="__custom__">+ Outro</option>
        </select>
        <input type="text" class="custom-input" id="custom-exercise" placeholder="ejercicio" style="display:none">
      </div>

      <div class="rest-timer">
        <button class="btn btn-ghost btn-sm rest-timer-btn" onclick="startRest(60)">1m</button>
        <button class="btn btn-ghost btn-sm rest-timer-btn" onclick="startRest(90)">1:30</button>
        <button class="btn btn-ghost btn-sm rest-timer-btn" onclick="startRest(120)">2m</button>
        <div class="rest-timer-display" id="rest-display">--</div>
        <button class="btn-icon" onclick="stopRest()">×</button>
      </div>

      <div class="card">
        <div class="card-title" id="current-exercise-label">Series</div>
        <div class="sets-header">
          <div></div>
          <div>Reps</div>
          <div>Kg</div>
          <div></div>
        </div>
        <div id="sets-container"></div>
        <div class="form-actions">
          <button class="btn-add" onclick="addSet()">+ serie</button>
          <button class="btn" onclick="saveSession()">Guardar</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-stats">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-title">Esta semana</div>
        <div id="weekly-chart">
          <div class="empty-state" style="padding:1rem">Sin datos</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-history">
      <div class="history-filters">
        <select id="filter-exercise" onchange="renderTable()">
          <option value="">todos</option>
        </select>
        <select id="sort-col" onchange="renderTable()">
          <option value="date">recientes</option>
          <option value="exercise">ejercicio</option>
        </select>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead><tr><th>Fecha</th><th>Ejercicio</th><th>S</th><th>Kg</th><th></th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none">Sin registros</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-title">¿Eliminar?</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const USERS_KEY = 'gymlog_users';
const REMEMBER_KEY = 'gymlog_remember';
const DATA_KEY = u => `gymlog_data_${u.toLowerCase().trim()}`;

let currentUser = null;
let pendingDeleteId = null;
let sets = [];
let restInterval = null;

function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); }
function saveUsers(list) { localStorage.setItem(USERS_KEY, JSON.stringify(list)); }
function getData(u) { return JSON.parse(localStorage.getItem(DATA_KEY(u)) || '[]'); }
function saveData(u, data) { localStorage.setItem(DATA_KEY(u), JSON.stringify(data)); }

function init() {
  const remembered = localStorage.getItem(REMEMBER_KEY);
  if (remembered) {
    const users = getUsers();
    if (users.includes(remembered)) {
      doLogin(remembered);
      return;
    }
  }
  renderQuickUsers();
}

function renderQuickUsers() {
  const users = getUsers();
  const section = document.getElementById('quick-users');
  const container = document.getElementById('user-chips');
  if (!users.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  container.innerHTML = users.map(u => `<span class="user-chip" onclick="doLogin('${u}')">${u}</span>`).join('');
}

function login() {
  const username = document.getElementById('username-input').value.trim();
  if (!username) { toast('Escribe tu nombre'); return; }
  const users = getUsers();
  if (!users.includes(username)) { users.push(username); saveUsers(users); }
  localStorage.setItem(REMEMBER_KEY, username);
  doLogin(username);
}

function doLogin(u) {
  currentUser = u;
  document.getElementById('topbar-user').textContent = u;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  sets = [];
  renderSets();
  refreshAll();
}

function logout() {
  currentUser = null;
  stopRest();
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('username-input').value = '';
  renderQuickUsers();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

function onExerciseChange(sel) {
  const ci = document.getElementById('custom-exercise');
  ci.style.display = sel.value === '__custom__' ? 'block' : 'none';
  if (sel.value === '__custom__') ci.focus();
  updateLabel();
  if (!sets.length) addSet();
}

function getExercise() {
  const sel = document.getElementById('exercise-select').value;
  return sel === '__custom__' ? document.getElementById('custom-exercise').value.trim() : sel;
}

function updateLabel() {
  const ex = getExercise();
  document.getElementById('current-exercise-label').textContent = ex ? `Series — ${ex}` : 'Series';
}

function addSet() {
  const last = sets[sets.length - 1];
  sets.push({ id: Date.now(), reps: last?.reps || '', weight: last?.weight || '' });
  renderSets();
}

function removeSet(id) { sets = sets.filter(s => s.id !== id); renderSets(); }

function renderSets() {
  const c = document.getElementById('sets-container');
  if (!sets.length) { c.innerHTML = '<div class="empty-state" style="padding:1rem">Toca + serie</div>'; return; }
  c.innerHTML = sets.map((s, i) => `
    <div class="set-row">
      <div class="set-num">${i + 1}</div>
      <input type="number" placeholder="reps" value="${s.reps}" oninput="updateSet(${s.id},'reps',this.value)">
      <input type="number" placeholder="kg" value="${s.weight}" oninput="updateSet(${s.id},'weight',this.value)">
      <button class="btn-icon" onclick="removeSet(${s.id})">×</button>
    </div>
  `).join('');
}

function updateSet(id, f, v) { const s = sets.find(s => s.id === id); if (s) s[f] = v; }

function startRest(sec) {
  stopRest();
  let t = sec;
  const d = document.getElementById('rest-display');
  const run = () => {
    d.textContent = Math.floor(t/60) + ':' + (t%60).toString().padStart(2,'0');
    if (t-- <= 0) { stopRest(); playBeep(); toast('Descanso listo!'); }
  };
  run();
  restInterval = setInterval(run, 1000);
}

function stopRest() {
  clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-display').textContent = '--';
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.2;
    osc.start(); osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function saveSession() {
  const ex = getExercise();
  if (!ex) { toast('Elige ejercicio'); return; }
  const valid = sets.filter(s => s.reps && s.weight);
  if (!valid.length) { toast('Añade serie'); return; }

  const data = getData(currentUser);
  const now = new Date();
  valid.forEach((s, i) => {
    data.push({ id: `${Date.now()}_${i}`, date: now.toLocaleDateString('es-ES'), ts: now.getTime(), exercise: ex, set: i+1, reps: Number(s.reps), weight: Number(s.weight) });
  });

  saveData(currentUser, data);
  sets = []; renderSets();
  document.getElementById('exercise-select').value = '';
  document.getElementById('custom-exercise').style.display = 'none';
  updateLabel();
  refreshAll();
  toast('✓ Guardado');
}

function refreshStats() {
  const d = getData(currentUser);
  const exs = [...new Set(d.map(r => r.exercise))];
  const days = [...new Set(d.map(r => r.date))];
  const vol = d.reduce((a, r) => a + r.reps * r.weight, 0);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val">${days.length}</div><div class="stat-label">Días</div></div>
    <div class="stat-card"><div class="stat-val">${d.length}</div><div class="stat-label">Series</div></div>
    <div class="stat-card"><div class="stat-val">${(vol/1000).toFixed(1)}t</div><div class="stat-label">Volumen</div></div>
    <div class="stat-card"><div class="stat-val">${exs.length}</div><div class="stat-label">Ejercicios</div></div>
  `;
}

function renderWeeklyChart() {
  const d = getData(currentUser);
  const now = new Date();
  const weekAgo = now.getTime() - 7*24*60*60*1000;
  const days = [];
  const names = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(now); dt.setDate(dt.getDate() - i);
    days.push({ label: names[dt.getDay()], vol: 0 });
  }
  d.filter(r => r.ts >= weekAgo).forEach(r => {
    const idx = Math.min(6, Math.floor((r.ts - weekAgo) / (24*60*60*1000)));
    if (days[idx]) days[idx].vol += r.reps * r.weight;
  });
  const max = Math.max(...days.map(d => d.vol), 1);
  document.getElementById('weekly-chart').innerHTML = `
    <div class="chart-bars">
      ${days.map(d => `<div class="chart-bar"><div class="bar-fill" style="height:${(d.vol/max)*80}px"></div><span class="bar-label">${d.label}</span></div>`).join('')}
    </div>
  `;
}

function getPRs(d) {
  const m = {};
  d.forEach(r => { if (!m[r.exercise] || r.weight > m[r.exercise]) m[r.exercise] = r.weight; });
  return m;
}

function renderTable() {
  const d = getData(currentUser);
  const f = document.getElementById('filter-exercise').value;
  const s = document.getElementById('sort-col').value;
  const prs = getPRs(d);
  let rows = f ? d.filter(r => r.exercise === f) : [...d];
  if (s === 'date') rows.sort((a, b) => b.ts - a.ts);
  else if (s === 'exercise') rows.sort((a, b) => a.exercise.localeCompare(b.exercise));

  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  if (!rows.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = rows.slice(0, 50).map(r => `
    <tr>
      <td class="td-muted">${r.date}</td>
      <td class="td-exercise">${r.exercise}${r.weight === prs[r.exercise] ? '<span class="pr-badge">PR</span>' : ''}</td>
      <td class="td-muted">${r.set}</td>
      <td class="td-num">${r.weight}</td>
      <td><button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem" onclick="askDelete('${r.id}','${r.exercise}')">×</button></td>
    </tr>
  `).join('');
}

function refreshFilter() {
  const d = getData(currentUser);
  const exs = [...new Set(d.map(r => r.exercise))].sort();
  const sel = document.getElementById('filter-exercise');
  sel.innerHTML = '<option value="">todos</option>' + exs.map(e => `<option value="${e}">${e}</option>`).join('');
}

function refreshAll() { refreshStats(); renderWeeklyChart(); refreshFilter(); renderTable(); }

function askDelete(id, label) {
  pendingDeleteId = id;
  document.getElementById('modal-sub').textContent = label;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeModal() { pendingDeleteId = null; document.getElementById('confirm-modal').classList.remove('open'); }
function confirmDelete() {
  if (pendingDeleteId) {
    saveData(currentUser, getData(currentUser).filter(r => r.id !== pendingDeleteId));
    closeModal();
    refreshAll();
    toast('Eliminado');
  }
}

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

init();
document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
